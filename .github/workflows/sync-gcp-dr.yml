name: Sync GCP-DR after production rollout

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  sync-gcp-dr:
    name: Wait for rollout - Sync GCP-DR
    runs-on: ubuntu-latest
    steps:

      - uses: actions/checkout@v6

      - name: Extract component and version
        id: info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find the most recently merged deploy PR on main
          DEPLOY_PR=$(gh pr list --repo dannut/klist-infra --base main --state merged --limit 5 --json title --jq '.[].title' | grep -m1 "Deploy.*to production" || true)
          if [ -z "$DEPLOY_PR" ]; then
            echo "No deploy PR found — skipping GCP-DR sync"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "Found deploy PR: $DEPLOY_PR"
          if echo "$DEPLOY_PR" | grep -qi "backend"; then
            COMPONENT="backend"
          else
            COMPONENT="frontend"
          fi
          VERSION=$(echo "$DEPLOY_PR" | grep -oP 'v\d+\.\d+\.\d+' | head -1)
          if [ -z "$VERSION" ]; then
            echo "Could not extract version — skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "component=$COMPONENT" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Deploying $COMPONENT $VERSION to GCP-DR after rollout confirmation"

      - name: Wait for production rollout to complete
        if: steps.info.outputs.skip != 'true'
        run: |
          VERSION="${{ steps.info.outputs.version }}"
          echo "Waiting for kli.st to run backend $VERSION..."
          for i in $(seq 1 30); do
            CURRENT=$(curl -sf https://kli.st/api/version | jq -r '.version' 2>/dev/null || echo "")
            if [ "$CURRENT" = "$VERSION" ]; then
              echo "Production confirmed running $VERSION — rollout succeeded"
              exit 0
            fi
            echo "Attempt $i/30: current=$CURRENT, expected=$VERSION — waiting 30s..."
            sleep 30
          done
          echo "Timeout: production did not reach $VERSION in 15 minutes"
          exit 1

      - name: Sync GCP-DR via kubectl
        if: steps.info.outputs.skip != 'true'
        run: |
          COMPONENT="${{ steps.info.outputs.component }}"
          VERSION="${{ steps.info.outputs.version }}"
          IMAGE="ghcr.io/dannut/klist-${COMPONENT}:${VERSION}"

          echo "${{ secrets.GCP_KUBECONFIG }}" > /tmp/gcp.yaml
          chmod 600 /tmp/gcp.yaml

          echo "Updating $COMPONENT to $VERSION on GCP-DR..."
          kubectl set image deployment/kli-${COMPONENT} \
            kli-${COMPONENT}=${IMAGE} \
            -n kli \
            --kubeconfig /tmp/gcp.yaml

          kubectl rollout status deployment/kli-${COMPONENT} \
            -n kli \
            --kubeconfig /tmp/gcp.yaml \
            --timeout=5m

          rm -f /tmp/gcp.yaml
          echo "GCP-DR synced to $COMPONENT $VERSION successfully"

      - name: Notify failure
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'GCP-DR sync FAILED — ${{ steps.info.outputs.component }} ${{ steps.info.outputs.version }}',
              body: '## GCP-DR Sync Failed\n\n' +
                '**Component:** ${{ steps.info.outputs.component }}\n' +
                '**Version:** ${{ steps.info.outputs.version }}\n\n' +
                'Production rollout may have failed or GCP-DR sync encountered an error.\n' +
                'Check the workflow run for details.',
              labels: ['ci-failure'],
            });
