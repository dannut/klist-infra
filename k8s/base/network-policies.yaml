---
# Default deny: block all ingress+egress traffic in namespace
# Policies below explicitly allow only what is needed
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# Allow all pods egress to Vault
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-vault-egress
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: vault
    ports:
    - protocol: TCP
      port: 8200

---
# Global DNS — all pods need DNS resolution
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-global
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# FRONTEND: receives from Cloudflared, sends to Backend
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend
spec:
  podSelector:
    matchLabels:
      app: kli-frontend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: cloudflared
      ports:
        - port: 8080
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: kli-backend
      ports:
        - port: 8080

---
# BACKEND: receives from Frontend, sends to DB, Redis, Gemini API, and Vault
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend
spec:
  podSelector:
    matchLabels:
      app: kli-backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: kli-frontend
      ports:
        - port: 8080
    # Allow smoke tests from AnalysisRun jobs
    - from:
        - podSelector:
            matchLabels:
              app: smoke-test
      ports:
        - port: 8080
  egress:
    - to: [{podSelector: {matchLabels: {app: postgres}}}]
      ports: [{port: 5432}]
    - to: [{podSelector: {matchLabels: {app: redis}}}]
      ports: [{port: 6379}]
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vault
      ports: [{port: 8200}]
    # Gemini API
    - ports:
        - port: 443
          protocol: TCP

---
# POSTGRES & REDIS: accept only from Backend
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-db-and-cache
spec:
  podSelector:
    matchExpressions:
      - {key: app, operator: In, values: [postgres, redis]}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: kli-backend
      ports:
        - port: 5432
        - port: 6379

---
# CLOUDFLARED: internet access for tunnel
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cloudflared
spec:
  podSelector:
    matchLabels:
      app: cloudflared
  policyTypes:
    - Ingress
    - Egress
  egress:
    - ports:
        - port: 443
        - port: 7844
          protocol: TCP
        - port: 7844
          protocol: UDP
    - to:
        - podSelector:
            matchLabels:
              app: kli-frontend
      ports:
        - port: 8080
