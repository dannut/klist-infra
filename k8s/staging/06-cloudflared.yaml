---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: kli-staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "kli-staging-backend"
        vault.hashicorp.com/agent-inject-secret-cloudflare: "kli-staging/data/cloudflare"
        vault.hashicorp.com/agent-inject-template-cloudflare: |
          {{- with secret "kli-staging/data/cloudflare" -}}
          {{ .Data.data.TUNNEL_TOKEN }}
          {{- end }}
    spec:
      serviceAccountName: kli-cloudflared
      # ASIGURĂ-TE CĂ FUGI DE WORKER2 (cel defect)
      nodeSelector:
        kubernetes.io/hostname: worker1  # Încearcă worker1, am văzut că Postgres merge bine acolo
      containers:
        - name: cloudflared
          # FOLOSEȘTE ACEST TAG (E cel mai stabil pt Alpine)
          image: cloudflare/cloudflared:2025.1.0-alpine
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          args:
            - "cloudflared tunnel run --token $(cat /vault/secrets/cloudflare)"
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
