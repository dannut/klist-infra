---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: kli-staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "kli-staging-backend"
        # Injecteaza un fisier YAML valid pe care cloudflared il citeste direct
        vault.hashicorp.com/agent-inject-secret-config.yaml: "kli-staging/data/cloudflare"
        vault.hashicorp.com/agent-inject-template-config.yaml: |
          {{- with secret "kli-staging/data/cloudflare" -}}
          token: {{ .Data.data.TUNNEL_TOKEN }}
          {{- end }}
    spec:
      serviceAccountName: kli-cloudflared
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          args:
            - tunnel
            - --no-autoupdate
            - --protocol
            - http2
            - --config
            - /vault/secrets/config.yaml
            - run
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
