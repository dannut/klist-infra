---
apiVersion: batch/v1
kind: Job
metadata:
  name: ollama-pull-models
  namespace: kli-staging
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: master
      restartPolicy: OnFailure
      containers:
        - name: pull
          image: curlimages/curl:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Pulling llama3.2..."
              curl -s http://ollama.kli-staging.svc.cluster.local:11434/api/pull \
                -d '{"name":"llama3.2"}' | tail -1

              echo "Pulling nomic-embed-text..."
              curl -s http://ollama.kli-staging.svc.cluster.local:11434/api/pull \
                -d '{"name":"nomic-embed-text"}' | tail -1

              echo "Done!"
