# 1. Blocăm tot traficul implicit (Siguranță maximă)
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: kli-staging
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

# 2. Permite tuturor pod-urilor să rezolve nume DNS (Esențial pentru comunicare)
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-global
  namespace: kli-staging
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

# 3. FRONTEND: Primește de la Cloudflare, trimite la Backend
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend
  namespace: kli-staging
spec:
  podSelector:
    matchLabels:
      app: kli-frontend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: cloudflared
      ports:
        - port: 8080
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: kli-backend
      ports:
        - port: 8080

# 4. BACKEND: Primește de la Frontend, trimite la DB, Redis, Ollama și Vault
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend
  namespace: kli-staging
spec:
  podSelector:
    matchLabels:
      app: kli-backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: kli-frontend
      ports:
        - port: 8080
  egress:
    - to: [{podSelector: {matchLabels: {app: postgres}}}]
      ports: [{port: 5432}]
    - to: [{podSelector: {matchLabels: {app: redis}}}]
      ports: [{port: 6379}]
    - to: [{podSelector: {matchLabels: {app: ollama}}}]
      ports: [{port: 11434}]
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vault
      ports: [{port: 8200}]

# 5. POSTGRES & REDIS: Acceptă doar de la Backend
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-db-and-cache
  namespace: kli-staging
spec:
  podSelector:
    matchExpressions:
      - {key: app, operator: In, values: [postgres, redis]}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: kli-backend
      ports:
        - port: 5432
        - port: 6379

# 6. CLOUDFLARED: Acces la internet pentru Tunel
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cloudflared
  namespace: kli-staging
spec:
  podSelector:
    matchLabels:
      app: cloudflared
  policyTypes:
    - Ingress
    - Egress
  egress:
    - ports:
        - port: 443
        - port: 7844
          protocol: TCP
        - port: 7844
          protocol: UDP
    - to:
        - podSelector:
            matchLabels:
              app: kli-frontend
      ports:
        - port: 8080
# 7. OLLAMA: Acceptă conexiuni de la Backend pe portul 11434
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ollama-ingress
  namespace: kli-staging
spec:
  podSelector:
    matchLabels:
      app: ollama
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: kli-backend
      ports:
        - protocol: TCP
          port: 11434
# 7. OLLAMA: Permite Ingress din Backend și Egress la Internet pentru modele
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ollama-full
  namespace: kli-staging
spec:
  podSelector:
    matchLabels:
      app: ollama
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: kli-backend
      ports:
        - protocol: TCP
          port: 11434
  egress:
    - ports:
        - port: 443
          protocol: TCP
        - port: 80
          protocol: TCP
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
          
