# ── Default deny all ingress + egress in namespace kli-staging ────────────────
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: kli-staging
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

# ── Frontend: accept din cloudflared, trimite la backend ──────────────────────
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend
  namespace: kli-staging
spec:
  podSelector:
    matchLabels:
      app: kli-frontend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: cloudflared
      ports:
        - port: 8080
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: kli-backend
      ports:
        - port: 8080
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

# ── Backend: accept din frontend, trimite la postgres/redis/ollama ────────────
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend
  namespace: kli-staging
spec:
  podSelector:
    matchLabels:
      app: kli-backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: kli-frontend
      ports:
        - port: 8080
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - port: 6379
    - to:
        - podSelector:
            matchLabels:
              app: ollama
      ports:
        - port: 11434
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

# ── Postgres: accept doar din backend ─────────────────────────────────────────
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres
  namespace: kli-staging
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: kli-backend
      ports:
        - port: 5432

# ── Redis: accept doar din backend ────────────────────────────────────────────
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-redis
  namespace: kli-staging
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: kli-backend
      ports:
        - port: 6379

# ── Ollama: accept din backend, egress internet pentru pull modele ────────────
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ollama
  namespace: kli-staging
spec:
  podSelector:
    matchLabels:
      app: ollama
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: kli-backend
      ports:
        - port: 11434
  egress:
    - ports:
        - port: 443
        - port: 80
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

# ── Vault Agent: permite egress catre Vault si DNS din toate podurile ─────────
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-vault-egress
  namespace: kli-staging
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vault
      ports:
        - port: 8200
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

# ── Cloudflared: egress catre internet pentru tunnel ─────────────────────────
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cloudflared
  namespace: kli-staging
spec:
  podSelector:
    matchLabels:
      app: cloudflared
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: kli-frontend
      ports:
        - port: 8080
  egress:
    - ports:
        - port: 443
          protocol: TCP
        - port: 7844
          protocol: TCP
        - port: 7844
          protocol: UDP
        - port: 53
          protocol: UDP
