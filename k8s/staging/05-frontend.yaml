---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kli-frontend
  namespace: kli-staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kli-frontend
  template:
    metadata:
      labels:
        app: kli-frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: kli-frontend
          image: ghcr.io/dannut/klist-frontend:staging-f76f5d05278eb55247cc9219582cf9a045a759f7
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi

---
apiVersion: v1
kind: Service
metadata:
  name: kli-frontend
  namespace: kli-staging
spec:
  selector:
    app: kli-frontend
  ports:
    - port: 8080
      targetPort: 8080
