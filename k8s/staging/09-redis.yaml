---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: kli-staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "kli-staging-backend"
        vault.hashicorp.com/agent-inject-secret-redis: "kli-staging/data/redis"
        vault.hashicorp.com/agent-inject-template-redis: |
          {{- with secret "kli-staging/data/redis" -}}
          {{ .Data.data.REDIS_PASSWORD }}
          {{- end }}
    spec:
      serviceAccountName: kli-backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - sh
            - -c
            - redis-server --requirepass "$(cat /vault/secrets/redis)" --save "" --appendonly no
          ports:
            - containerPort: 6379
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: kli-staging
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
