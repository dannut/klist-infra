---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kli-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kli-backend
  template:
    metadata:
      labels:
        app: kli-backend
    spec:
      nodeSelector:
        kubernetes.io/hostname: "master"
      serviceAccountName: kli-backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: kli-backend
          image: ghcr.io/dannut/klist-backend:v2.1.3
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: kli-app-secret
            - secretRef:
                name: kli-redis-secret
            - secretRef:
                name: kli-gemini-secret
          env:
            - name: CORS_ORIGIN
              value: "https://test.kli.st"
            - name: REDIS_URL
              value: "redis.kli-staging.svc.cluster.local:6379"
            - name: HSTS_ENABLED
              value: "false"
            - name: TRUSTED_PROXIES
              value: "10.0.0.0/8"
            - name: DB_SSLMODE
              value: "disable"
            - name: APP_VERSION
              valueFrom:
                configMapKeyRef:
                  name: app-version
                  key: version
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

---
apiVersion: v1
kind: Service
metadata:
  name: kli-backend
spec:
  selector:
    app: kli-backend
  ports:
    - port: 8080
      targetPort: 8080
