apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kli-staging

resources:
- ../../base
- backend-deployment.yaml
- frontend-deployment.yaml
- vso-auth.yaml
- app-version.yaml
- ingress.yaml

images:
- name: cloudflare/cloudflared
  newTag: latest
- name: ghcr.io/dannut/klist-backend
  newTag: staging-77e649e
- name: ghcr.io/dannut/klist-frontend
  newTag: staging-0a707ad

patches:
- patch: |-
    - op: replace
      path: /spec/resources/requests/storage
      value: 2Gi
  target:
    kind: PersistentVolumeClaim
    name: postgres-pvc
- patch: |-
    - op: add
      path: /spec/template/spec/nodeSelector
      value:
        kubernetes.io/hostname: "master"
  target:
    kind: Deployment
    name: postgres
