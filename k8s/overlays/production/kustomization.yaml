apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kli

resources:
  - ../../base
  - vso-auth.yaml
  - backend-rollout.yaml
  - frontend-rollout.yaml
  - analysis-templates.yaml
  - app-version.yaml
  - ingress.yaml

images:
  - name: ghcr.io/dannut/klist-backend
    newTag: v2.1.3
  - name: ghcr.io/dannut/klist-frontend
    newTag: v2.1.3

patches:
  # Production postgres uses VSO secret (kli-app-secret) — base already uses this secret name
  # Override PVC storage size to 5Gi (matches base default)
  - patch: |-
      - op: replace
        path: /spec/resources/requests/storage
        value: 5Gi
    target:
      kind: PersistentVolumeClaim
      name: postgres-pvc
