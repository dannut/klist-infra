---
# Argo Rollout — Blue/Green strategy for kli-backend
# Active service  → receives production traffic (kli.st)
# Preview service → receives smoke test traffic before promotion
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: kli-backend
spec:
  replicas: 2
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: kli-backend
  template:
    metadata:
      labels:
        app: kli-backend
    spec:
      serviceAccountName: kli-backend
      nodeSelector:
        kubernetes.io/hostname: "master"
      imagePullSecrets:
        - name: ghcr-login
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: kli-backend
          image: ghcr.io/dannut/klist-backend:v2.1.3
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: kli-app-secret
            - secretRef:
                name: kli-redis-secret
            - secretRef:
                name: kli-gemini-secret
          env:
            - name: DB_HOST
              value: "postgres"
            - name: CORS_ORIGIN
              value: "https://kli.st"
            - name: REDIS_URL
              value: "redis.kli.svc.cluster.local:6379"
            - name: HSTS_ENABLED
              value: "true"
            - name: TRUSTED_PROXIES
              value: "10.0.0.0/8"
            - name: DB_SSLMODE
              value: "disable"
            - name: APP_VERSION
              valueFrom:
                configMapKeyRef:
                  name: app-version
                  key: version
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 512Mi
  strategy:
    blueGreen:
      # Active service — production traffic
      activeService: kli-backend-active
      # Preview service — smoke test traffic
      previewService: kli-backend-preview
      autoPromotionEnabled: false
      prePromotionAnalysis:
        templates:
          - templateName: backend-smoke-test
        args:
          - name: container
            value: kli-backend
      postPromotionAnalysis:
        templates:
          - templateName: backend-health-check
        args:
          - name: container
            value: kli-backend
      # Scale down old (blue) replica after 10 minutes
      scaleDownDelaySeconds: 60

---
# Active service — receives production traffic from Ingress
apiVersion: v1
kind: Service
metadata:
  name: kli-backend-active
spec:
  selector:
    app: kli-backend
  ports:
    - port: 8080
      targetPort: 8080

---
# Preview service — receives smoke test traffic
apiVersion: v1
kind: Service
metadata:
  name: kli-backend-preview
spec:
  selector:
    app: kli-backend
  ports:
    - port: 8080
      targetPort: 8080

---
# Generic service — used by nginx.prod.conf proxy_pass
# Points to the same pods as kli-backend-active
apiVersion: v1
kind: Service
metadata:
  name: kli-backend
spec:
  selector:
    app: kli-backend
  ports:
    - port: 8080
      targetPort: 8080
