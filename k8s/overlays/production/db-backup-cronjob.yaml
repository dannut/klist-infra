apiVersion: batch/v1
kind: CronJob
metadata:
  name: db-backup
  namespace: kli
spec:
  # Zilnic la 02:00 UTC
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          serviceAccountName: default
          containers:
            - name: db-backup
              image: gcr.io/google.com/cloudsdktool/google-cloud-cli:alpine
              command:
                - /bin/sh
                - -c
                - |
                  set -e

                  # Autentificare GCP cu service account
                  echo "${GCP_SA_KEY}" | base64 -d > /tmp/sa-key.json
                  gcloud auth activate-service-account --key-file=/tmp/sa-key.json

                  # Timestamp pentru numele fișierului
                  TIMESTAMP=$(date +%Y%m%d_%H%M%S)
                  BACKUP_FILE="db-backup-${TIMESTAMP}.sql.gz"

                  # pg_dump direct din PostgreSQL + compresie
                  PGPASSWORD="${DB_PASSWORD}" pg_dump \
                    -h postgres \
                    -U postgres \
                    -d kli \
                    --no-owner \
                    --no-acl \
                    | gzip > /tmp/${BACKUP_FILE}

                  # Upload în GCS
                  gsutil cp /tmp/${BACKUP_FILE} gs://${GCS_BUCKET}/db/${BACKUP_FILE}

                  echo "Backup complet: gs://${GCS_BUCKET}/db/${BACKUP_FILE}"

                  # Cleanup local
                  rm -f /tmp/${BACKUP_FILE} /tmp/sa-key.json
              env:
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: kli-app-secret
                      key: DB_PASSWORD
                - name: GCP_SA_KEY
                  valueFrom:
                    secretKeyRef:
                      name: gcp-backup-sa
                      key: sa-key
                - name: GCS_BUCKET
                  value: "klist-backups-project-092a68fd-42f4-4f6a-8fb"
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
