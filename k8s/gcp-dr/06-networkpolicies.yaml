---
# Default deny: blochează tot traficul ingress+egress în namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: kli
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# DNS global — toate pod-urile au nevoie de DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-global
  namespace: kli
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# FRONTEND: Primește de la Cloudflare, trimite la Backend
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend
  namespace: kli
spec:
  podSelector:
    matchLabels:
      app: kli-frontend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: cloudflared
      ports:
        - port: 8080
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: kli-backend
      ports:
        - port: 8080

---
# BACKEND: Primește de la Frontend, trimite la DB, Redis și Gemini API
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend
  namespace: kli
spec:
  podSelector:
    matchLabels:
      app: kli-backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: kli-frontend
      ports:
        - port: 8080
  egress:
    - to: [{podSelector: {matchLabels: {app: postgres}}}]
      ports: [{port: 5432}]
    - to: [{podSelector: {matchLabels: {app: redis}}}]
      ports: [{port: 6379}]
    # Gemini API — doar HTTPS extern
    - ports:
        - port: 443
          protocol: TCP

---
# POSTGRES & REDIS: Acceptă doar de la Backend
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-db-and-cache
  namespace: kli
spec:
  podSelector:
    matchExpressions:
      - {key: app, operator: In, values: [postgres, redis]}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: kli-backend
      ports:
        - port: 5432
        - port: 6379

---
# CLOUDFLARED: Acces la internet pentru Tunel
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cloudflared
  namespace: kli
spec:
  podSelector:
    matchLabels:
      app: cloudflared
  policyTypes:
    - Ingress
    - Egress
  egress:
    - ports:
        - port: 443
        - port: 7844
          protocol: TCP
        - port: 7844
          protocol: UDP
    - to:
        - podSelector:
            matchLabels:
              app: kli-frontend
      ports:
        - port: 8080
