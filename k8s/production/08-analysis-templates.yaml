---
# Pre-promotion smoke test — verifică că podurile Green sunt ready înainte de promote
# Folosește kube-state-metrics din Prometheus (nu curl, nu job pods)
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: backend-smoke-test
  namespace: kli
spec:
  args:
    - name: container
      value: kli-backend
  metrics:
    - name: pods-ready
      # 3 verificări × 20s = ~1 minut înainte de promote
      interval: 20s
      count: 3
      failureLimit: 0
      successCondition: result[0] >= 1
      provider:
        prometheus:
          address: http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
          query: |
            min(kube_pod_container_status_ready{namespace="kli",container="{{args.container}}"})

---
# Post-promotion health check — monitorizează 10 minute după promote
# Dacă sunt restart-uri → rollback automat la Blue
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: backend-health-check
  namespace: kli
spec:
  args:
    - name: container
      value: kli-backend
  metrics:
    - name: no-restarts
      # 10 verificări × 60s = 10 minute post-promote
      interval: 60s
      count: 10
      failureLimit: 2
      successCondition: result[0] == 0
      provider:
        prometheus:
          address: http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
          query: |
            increase(kube_pod_container_status_restarts_total{namespace="kli",container="{{args.container}}"}[5m])

