---
# Argo Rollout — Blue/Green strategy for kli-frontend
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: kli-frontend
  namespace: kli
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: kli-frontend
  template:
    metadata:
      labels:
        app: kli-frontend
    spec:
      nodeSelector:
        kubernetes.io/hostname: "master"
      imagePullSecrets:
        - name: ghcr-login
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: kli-frontend
          image: ghcr.io/dannut/klist-frontend:2.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: BACKEND_URL
              value: "kli-backend-active" 
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
  strategy:
    blueGreen:
      activeService: kli-frontend-active
      previewService: kli-frontend-preview
      autoPromotionEnabled: false
      #prePromotionAnalysis:
        #templates:
          #- templateName: frontend-smoke-test
        #args:
          #- name: preview-service
            #value: kli-frontend-preview
      #postPromotionAnalysis:
        #templates:
          #- templateName: frontend-health-check
        args:
          - name: service-name
            value: kli-frontend-active
      scaleDownDelaySeconds: 600

---
# Active service — production traffic
apiVersion: v1
kind: Service
metadata:
  name: kli-frontend-active
  namespace: kli
spec:
  selector:
    app: kli-frontend
  ports:
    - port: 8080
      targetPort: 8080

---
# Preview service — smoke test traffic
apiVersion: v1
kind: Service
metadata:
  name: kli-frontend-preview
  namespace: kli
spec:
  selector:
    app: kli-frontend
  ports:
    - port: 8080
      targetPort: 8080
