---
# VaultConnection — adresa Vault pentru namespace kli
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultConnection
metadata:
  name: vault-connection
  namespace: kli
spec:
  address: http://vault.vault.svc.cluster.local:8200

---
# VaultAuth — autentificare Kubernetes (același role ca Vault Agent)
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: kli-auth
  namespace: kli
spec:
  vaultConnectionRef: vault-connection
  method: kubernetes
  mount: kubernetes
  kubernetes:
    role: kli-backend
    serviceAccount: kli-backend

---
# VaultStaticSecret — DB + config aplicatie → kli-app-secret
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: kli-app-secret
  namespace: kli
spec:
  vaultAuthRef: kli-auth
  mount: kli
  type: kv-v2
  path: app
  destination:
    name: kli-app-secret
    create: true
  refreshAfter: 1h

---
# VaultStaticSecret — Redis password → kli-redis-secret
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: kli-redis-secret
  namespace: kli
spec:
  vaultAuthRef: kli-auth
  mount: kli
  type: kv-v2
  path: redis
  destination:
    name: kli-redis-secret
    create: true
  refreshAfter: 1h

---
# VaultStaticSecret — Gemini API key → kli-gemini-secret
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: kli-gemini-secret
  namespace: kli
spec:
  vaultAuthRef: kli-auth
  mount: kli
  type: kv-v2
  path: gemini
  destination:
    name: kli-gemini-secret
    create: true
  refreshAfter: 1h

---
# VaultStaticSecret — Cloudflare tunnel token → cloudflare-tunnel
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: cloudflare-tunnel
  namespace: kli
spec:
  vaultAuthRef: kli-auth
  mount: kli
  type: kv-v2
  path: cloudflare
  destination:
    name: cloudflare-tunnel
    create: true
  refreshAfter: 24h
