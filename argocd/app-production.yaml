apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kli-production
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/dannut/klist-infra
    targetRevision: main
    path: k8s/production
  destination:
    server: https://kubernetes.default.svc
    namespace: kli
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
