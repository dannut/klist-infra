# HashiCorp Vault — Helm values pentru cluster kli.st
# Instalare: helm upgrade --install vault hashicorp/vault -n vault -f helm/vault-values.yaml
# Repo:      https://helm.releases.hashicorp.com

server:
  # Pinează vault-0 pe master — volumul Longhorn e atasat acolo
  # IMPORTANT: nu șterge această restricție fără să muți mai întâi volumul
  nodeSelector:
    kubernetes.io/hostname: master

  dataStorage:
    enabled: true
    size: 10Gi
    storageClass: longhorn

  # Autounseal via Vault Transit
  # IMPORTANT: token-ul pentru Transit seal NU se pune în repo.
  # Aplică manual ConfigMap-ul vault-config cu token-ul real.
  standalone:
    enabled: true
    config: |
      ui = true

      listener "tcp" {
        tls_disable = 1
        address = "[::]:8200"
        cluster_address = "[::]:8201"
      }

      storage "file" {
        path = "/vault/data"
      }

      seal "transit" {
        address    = "http://10.0.10.20:8205"
        key_name   = "autounseal-key"
        mount_path = "transit/"
        tls_disable = "true"
        token      = "REPLACE_WITH_TRANSIT_TOKEN"
      }

      disable_mlock = true

  ha:
    enabled: false  # Single node — suficient pentru on-premise capstone

  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m

  # Prioritate ridicată — Vault trebuie să pornească înainte de podurile care cer secrete
  priorityClassName: system-cluster-critical

  # Așteaptă vault-ul mic (transit seal) înainte să pornească
  # Fără asta, vault-0 pornește, nu găsește transit-ul, iese cu Completed și se repornește
  extraInitContainers:
    - name: wait-for-transit
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          echo "Waiting for transit vault at 10.0.10.20:8205..."
          until nc -z 10.0.10.20 8205; do
            echo "Transit vault not ready, retrying in 5s..."
            sleep 5
          done
          echo "Transit vault is ready."

injector:
  # Disabled — replaced by Vault Secrets Operator (VSO)
  # See helm/vso-values.yaml and k8s/production/00b-vso-auth.yaml
  enabled: false
