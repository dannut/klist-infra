# Vault Secrets Operator — Helm values
# Instalare: helm upgrade --install vault-secrets-operator hashicorp/vault-secrets-operator \
#              -n vault --create-namespace -f helm/vso-values.yaml
# Repo: https://helm.releases.hashicorp.com

defaultVaultConnection:
  enabled: true
  address: "http://vault.vault.svc.cluster.local:8200"

controller:
  nodeSelector:
    kubernetes.io/hostname: master
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 200m
