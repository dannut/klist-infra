alertmanager:
  alertmanagerSpec:
    nodeSelector:
      kubernetes.io/hostname: master
    secrets:
      - alertmanager-discord
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'namespace']
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 4h
      receiver: discord
      routes:
        - matchers:
            - alertname = "Watchdog"
          receiver: blackhole
    receivers:
      - name: blackhole
      - name: discord
        discord_configs:
          - webhook_url_file: /etc/alertmanager/secrets/alertmanager-discord/webhook_url
            title: '{{ .GroupLabels.alertname }}'
            message: |
              {{ range .Alerts }}
              **{{ .Status | toUpper }}** — {{ .Annotations.summary }}
              {{ .Annotations.description }}
              {{ end }}
    inhibit_rules:
      - source_matchers:
          - severity = critical
        target_matchers:
          - severity = warning
        equal: ['namespace', 'alertname']

grafana:
  service:
    nodePort: 31002
    type: NodePort
  nodeSelector:
    kubernetes.io/hostname: master
prometheus:
  prometheusSpec:
    nodeSelector:
      kubernetes.io/hostname: master
    retention: 15d
    storageSpec:
      volumeClaimTemplate:
        spec:
          resources:
            requests:
              storage: 50Gi
          storageClassName: longhorn
