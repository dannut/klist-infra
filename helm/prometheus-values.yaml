alertmanager:
  alertmanagerSpec:
    nodeSelector:
      kubernetes.io/hostname: master
    secrets:
      - alertmanager-discord
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'namespace']
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 4h
      receiver: discord
      routes:
        - matchers:
            - alertname = "Watchdog"
          receiver: blackhole
    receivers:
      - name: blackhole
      - name: discord
        slack_configs:
          - api_url: 'REPLACE_WITH_SLACK_WEBHOOK'
            channel: '#alerts'
            title: '{{ .GroupLabels.alertname }}'
            text: |
              {{ range .Alerts }}*{{ .Status | toUpper }}* — {{ .Annotations.summary }}
              {{ .Annotations.description }}{{ end }}
    inhibit_rules:
      - source_matchers:
          - severity = critical
        target_matchers:
          - severity = warning
        equal: ['namespace', 'alertname']

grafana:
  service:
    nodePort: 31002
    type: NodePort
  nodeSelector:
    kubernetes.io/hostname: master
defaultRules:
  rules:
    etcd: false
    kubeControllerManager: false
    kubeSchedulerAlerting: false
    kubeProxy: false

prometheus:
  prometheusSpec:
    nodeSelector:
      kubernetes.io/hostname: master
    scrapeInterval: "1s"
    evaluationInterval: "1s"
    retention: 15d
    storageSpec:
      volumeClaimTemplate:
        spec:
          resources:
            requests:
              storage: 50Gi
          storageClassName: longhorn
